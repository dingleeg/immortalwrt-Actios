name: AI小龙虾智能体

on:
  workflow_dispatch:

jobs:
  board:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup binary permissions
        run: chmod +x ./picoclaw-launcher ./picoclaw

      - name: Generate security configs from secrets
        env:
          AI_DEEPSEEK_API_KEY: ${{ secrets.AI_DEEPSEEK_API_KEY }}
          AI_DOUBAO_API_KEY: ${{ secrets.AI_DOUBAO_API_KEY }}
          AI_MODELSCOPE_API_KEY: ${{ secrets.AI_MODELSCOPE_API_KEY }}
          AI_GEMINI_API_KEY: ${{ secrets.AI_GEMINI_API_KEY }}
          AI_TELEGRAM_TOKEN_FLASH: ${{ secrets.AI_TELEGRAM_TOKEN_FLASH }}
          AI_TELEGRAM_TOKEN_DOUBAO: ${{ secrets.AI_TELEGRAM_TOKEN_DOUBAO }}
          AI_TELEGRAM_TOKEN_QWEN: ${{ secrets.AI_TELEGRAM_TOKEN_QWEN }}
        run: |
          echo "=== 环境变量诊断 ==="
          for var in AI_DEEPSEEK_API_KEY AI_DOUBAO_API_KEY AI_MODELSCOPE_API_KEY AI_GEMINI_API_KEY \
                     AI_TELEGRAM_TOKEN_FLASH AI_TELEGRAM_TOKEN_DOUBAO AI_TELEGRAM_TOKEN_QWEN; do
            if [ -z "${!var}" ]; then
              echo "  ❌ $var 为空"
            else
              echo "  ✅ $var 已设置"
            fi
          done
          echo "=== 开始生成 ==="
          python3 scripts/generate-security-yml.py

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: Run all agents
        run: |
          PICOCLAW_HOME=$(pwd)/deepseek-v4-flash ./picoclaw-launcher -public -no-browser -port 19991 ./deepseek-v4-flash/config.json &
          PID1=$!
          PICOCLAW_HOME=$(pwd)/doubao-seed-2-0 ./picoclaw-launcher -public -no-browser -port 19992 ./doubao-seed-2-0/config.json &
          PID2=$!
          PICOCLAW_HOME=$(pwd)/Qwen3.5-35B-A3B ./picoclaw-launcher -public -no-browser -port 19993 ./Qwen3.5-35B-A3B/config.json &
          PID3=$!
          PICOCLAW_HOME=$(pwd)/deepseek-v4-pro ./picoclaw-launcher -public -no-browser -port 19994 ./deepseek-v4-pro/config.json &
          PID4=$!
          PICOCLAW_HOME=$(pwd)/gemini-3-flash ./picoclaw-launcher -public -no-browser -port 19995 ./gemini-3-flash/config.json &
          PID5=$!
          echo "✅ All 5 agents started (PIDs: $PID1, $PID2, $PID3, $PID4, $PID5)"
          sleep 5
          ./cloudflared tunnel --url http://localhost:19991 --no-autoupdate > /tmp/tunnel1.log 2>&1 &
          ./cloudflared tunnel --url http://localhost:19992 --no-autoupdate > /tmp/tunnel2.log 2>&1 &
          ./cloudflared tunnel --url http://localhost:19993 --no-autoupdate > /tmp/tunnel3.log 2>&1 &
          ./cloudflared tunnel --url http://localhost:19994 --no-autoupdate > /tmp/tunnel4.log 2>&1 &
          ./cloudflared tunnel --url http://localhost:19995 --no-autoupdate > /tmp/tunnel5.log 2>&1 &
          sleep 10
          echo "=== deepseek-v4-flash Web UI ==="
          grep -o 'https://.*trycloudflare.com' /tmp/tunnel1.log || echo "not ready"
          echo "=== doubao-seed-2-0 Web UI ==="
          grep -o 'https://.*trycloudflare.com' /tmp/tunnel2.log || echo "not ready"
          echo "=== Qwen3.5-35B-A3B Web UI ==="
          grep -o 'https://.*trycloudflare.com' /tmp/tunnel3.log || echo "not ready"
          echo "=== deepseek-v4-pro Web UI ==="
          grep -o 'https://.*trycloudflare.com' /tmp/tunnel4.log || echo "not ready"
          echo "=== gemini-3-flash Web UI ==="
          grep -o 'https://.*trycloudflare.com' /tmp/tunnel5.log || echo "not ready"
          while kill -0 $PID1 2>/dev/null || kill -0 $PID2 2>/dev/null || kill -0 $PID3 2>/dev/null || kill -0 $PID4 2>/dev/null || kill -0 $PID5 2>/dev/null; do
            sleep 60
          done
          echo "All agents have exited."

      - name: Save changes back to repository
        if: always()
        run: |
          git config user.name "AI Board"
          git config user.email "ai-board@github-actions"
          git add -A
          git diff --staged --quiet || git commit -m "💾 Auto-save: agent memory [$(date '+%Y-%m-%d %H:%M')]"
          git push
